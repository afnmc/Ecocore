# AI Market simulation module.
simulation:
  tick-interval-seconds: 300
  actions-per-tick: 5.0

news:
  enabled: true

# Every event here is weighted (bukan random murni) — MarketEventManager
# memilih salah satu event ELIGIBLE (enabled: true) secara proporsional
# terhadap "weight" masing-masing. price-modifier/demand-modifier dikalikan
# ke harga/demand SEMENTARA selama durasi event, lalu tetap di-clamp oleh
# ElasticPricingEngine ke [minPrice, maxPrice] item — jadi event market
# tidak bisa membuat harga meledak melampaui batas item.
events:
  boom:
    enabled: true
    weight: 2.0
    min-duration-seconds: 600
    max-duration-seconds: 1800
    price-modifier: 1.25
    demand-modifier: 1.4

  crash:
    enabled: true
    weight: 2.0
    min-duration-seconds: 600
    max-duration-seconds: 1800
    price-modifier: 0.75
    demand-modifier: 0.6

  inflation:
    enabled: true
    weight: 1.0
    min-duration-seconds: 900
    max-duration-seconds: 2700
    price-modifier: 1.1
    demand-modifier: 1.15

  deflation:
    enabled: true
    weight: 1.0
    min-duration-seconds: 900
    max-duration-seconds: 2700
    price-modifier: 0.9
    demand-modifier: 0.85

  festival:
    enabled: true
    weight: 1.5
    min-duration-seconds: 1200
    max-duration-seconds: 3600
    price-modifier: 1.15
    demand-modifier: 1.3

  mining_week:
    enabled: true
    weight: 1.5
    min-duration-seconds: 3600
    max-duration-seconds: 7200
    price-modifier: 0.85
    demand-modifier: 0.7

  farming_week:
    enabled: true
    weight: 1.5
    min-duration-seconds: 3600
    max-duration-seconds: 7200
    price-modifier: 0.85
    demand-modifier: 0.7

  fishing_week:
    enabled: true
    weight: 1.5
    min-duration-seconds: 3600
    max-duration-seconds: 7200
    price-modifier: 0.85
    demand-modifier: 0.7

  double_demand:
    enabled: true
    weight: 1.0
    min-duration-seconds: 600
    max-duration-seconds: 1200
    price-modifier: 1.3
    demand-modifier: 2.0

  double_supply:
    enabled: true
    weight: 1.0
    min-duration-seconds: 600
    max-duration-seconds: 1200
    price-modifier: 0.7
    demand-modifier: 0.5
