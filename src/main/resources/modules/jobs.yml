# Jobs module.
xp-curve:
  base: 100.0
  multiplier: 1.12

max-level: 100

combo:
  window-millis: 4000
  max-multiplier: 2.0

bonus:
  daily-multiplier: 1.25
  weekly-multiplier: 1.5
  daily-reset-hour: 0

prestige:
  max: 5
  reward-multiplier-step: 0.1

# Reward yang diberikan setiap kali job naik level. money-per-level diberikan
# di SETIAP level-up. milestones diberikan SATU KALI saat mencapai level
# tertentu (tambahan di atas money-per-level), boleh disertai item.
level-rewards:
  money-per-level: 10.0
  milestones:
    10:
      money: 150.0
      items:
        - material: IRON_INGOT
          amount: 8
    25:
      money: 400.0
      items:
        - material: DIAMOND
          amount: 2
    50:
      money: 1000.0
      items:
        - material: EMERALD
          amount: 5
    100:
      money: 3000.0
      items:
        - material: NETHERITE_INGOT
          amount: 1

jobs:
  mining:
    enabled: true
    base-xp-per-action: 5.0
    base-reward-per-action: 2.0

  farming:
    enabled: true
    base-xp-per-action: 4.0
    base-reward-per-action: 1.5

  fishing:
    enabled: true
    base-xp-per-action: 6.0
    base-reward-per-action: 2.5

  hunting:
    enabled: true
    base-xp-per-action: 7.0
    base-reward-per-action: 3.0

  woodcutting:
    enabled: true
    base-xp-per-action: 4.0
    base-reward-per-action: 1.5

  builder:
    enabled: true
    base-xp-per-action: 3.0
    base-reward-per-action: 1.0

  exploring:
    enabled: true
    base-xp-per-action: 5.0
    base-reward-per-action: 1.5
