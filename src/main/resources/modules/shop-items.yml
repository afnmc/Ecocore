# Katalog Dynamic Shop — sepenuhnya config-driven.
#
# Admin cukup edit file ini untuk menambah/mengubah/menghapus item dan
# kategori shop, TANPA perlu rebuild plugin. Setelah edit, jalankan
# /eco reload untuk menerapkan perubahan (item yang sudah ada harga
# dinamisnya di database TIDAK di-reset oleh reload — hanya item baru
# yang akan dibuatkan record harga awal).
#
# ATURAN AMAN HARGA (WAJIB dibaca sebelum menambah item baru):
# - min-price dan max-price WAJIB diisi masuk akal untuk SETIAP item.
#   ElasticPricingEngine akan selalu meng-clamp harga akhir ke rentang ini,
#   jadi harga tidak akan pernah melebihi max-price walau demand meledak.
# - JANGAN mendaftarkan item langka/OP (elytra, netherite gear, totem of
#   undying, enchanted golden apple, nether star, shulker box, dll) kecuali
#   kamu benar-benar sudah mengatur min-price/max-price yang wajar untuk
#   ekonomi server-mu. Item-item tersebut juga tetap diblokir di level Sell
#   module lewat blacklist di modules/sell.yml sebagai lapisan pengaman
#   kedua, terlepas dari apakah item itu didaftarkan di sini atau tidak.
# - elasticity yang lebih tinggi (mendekati 1.0) membuat harga bereaksi
#   lebih cepat terhadap demand/supply; nilai wajar ada di 0.10–0.25.
# - restock-seconds dan stock mengatur seberapa cepat & seberapa banyak
#   stok NPC kembali terisi; stock besar + restock cepat = harga lebih stabil.
# - sellable: false membuat item HANYA bisa dibeli (tidak bisa dijual balik
#   ke shop), berguna untuk item yang tidak ingin kamu buka jalur farming-nya.
# - buyable: false membuat item HANYA bisa dijual (tidak dijual NPC ke
#   pemain), berguna untuk drop hasil farming/mining yang memang cuma untuk
#   dijual, bukan dibeli ulang.

